<style>
  :root {
    --bg: oklch(0.975 0.004 75);
    --bg-2: oklch(0.95 0.006 75);
    --bg-3: oklch(0.92 0.007 75);
    --ink: oklch(0.22 0.01 70);
    --ink-2: oklch(0.4 0.012 70);
    --ink-3: oklch(0.58 0.012 70);
    --line: oklch(0.88 0.008 75);
    --line-2: oklch(0.82 0.01 75);
    --accent: oklch(0.58 0.15 45);
    --accent-ink: oklch(0.32 0.11 45);
    --paper: oklch(0.99 0.003 75);

    /* category hues (low chroma consistent) */
    --c-session:    oklch(0.62 0.12 30);   /* warm red */
    --c-context:    oklch(0.62 0.12 75);   /* amber */
    --c-config:     oklch(0.60 0.11 140);  /* olive green */
    --c-review:     oklch(0.58 0.12 200);  /* teal */
    --c-skills:     oklch(0.56 0.13 270);  /* indigo */
    --c-integ:      oklch(0.58 0.13 310);  /* violet */
    --c-remote:     oklch(0.60 0.11 350);  /* pink */
    --c-account:    oklch(0.55 0.09 110);  /* sage */
    --c-support:    oklch(0.50 0.02 80);   /* neutral */
    --c-schedule:   oklch(0.60 0.12 240);  /* blue */
    --c-input:      oklch(0.55 0.10 170);  /* jade */
  }
  [data-theme="dark"] {
    --bg:     oklch(0.18 0.006 75);
    --bg-2:   oklch(0.22 0.008 75);
    --bg-3:   oklch(0.27 0.01 75);
    --paper:  oklch(0.21 0.006 75);
    --ink:    oklch(0.94 0.006 75);
    --ink-2:  oklch(0.78 0.008 75);
    --ink-3:  oklch(0.60 0.01 75);
    --line:   oklch(0.32 0.01 75);
    --line-2: oklch(0.40 0.012 75);
    --accent: oklch(0.72 0.14 45);
    --accent-ink: oklch(0.86 0.10 45);
  }
  html { transition: background 0.2s, color 0.2s; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; }
  body { min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
  .disp { font-family: 'Fraunces', 'Inter', serif; letter-spacing: -0.01em; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input { font: inherit; color: inherit; }
</style>
</head>

  { id: 'schedule', label: 'Automation',       hint: 'Loops, routines, tasks',            color: 'var(--c-schedule)' },

  { id: 'support',  label: 'Help & Diagnostics', hint: 'Docs, debug, feedback, setup',    color: 'var(--c-support)' },

);

const { useState, useMemo, useEffect, useRef } = React;

/* --- Shared utilities --- */
const LS = { theme: 'atlas.theme', favs: 'atlas.favs' };

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : initial;
    } catch { return initial; }
  });
  useEffect(() => {
    try {
      if (val === null || val === undefined) localStorage.removeItem(key);
      else localStorage.setItem(key, JSON.stringify(val));
    } catch {}
  }, [key, val]);
  return [val, setVal];
}

function useWindowWidth() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    let raf = 0;
    const onResize = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => setW(window.innerWidth));
    };
    window.addEventListener('resize', onResize);
    return () => { window.removeEventListener('resize', onResize); cancelAnimationFrame(raf); };
  }, []);
  return w;
}

const VERSION_RE = /(Removed|New|Added)\s+in\s+v(\d+(?:\.\d+)*)/i;
const VERSION_META = Object.fromEntries(CMDS.map(c => {
  const m = VERSION_RE.exec((c.d || '') + ' ' + (c.s || ''));
  if (!m) return [c.n, null];
  const kind = m[1].toLowerCase() === 'removed' ? 'removed' : 'new';
  return [c.n, { kind, version: m[2] }];
}));

function fuzzyScore(q, cmd) {
  const n = cmd.n.toLowerCase();
  if (n === q) return 1000;
  if (n.startsWith(q)) return 500 - (n.length - q.length);
  if (n.includes(q)) return 300;
  const a = (cmd.a || '').toLowerCase();
  if (a.includes(q)) return 200;
  // subsequence across name
  let i = 0, last = -1, gap = 0;
  for (let j = 0; j < n.length && i < q.length; j++) {
    if (n[j] === q[i]) {
      if (last >= 0) gap += (j - last - 1);
      last = j; i++;
    }
  }
  if (i === q.length) return Math.max(50, 150 - Math.min(gap, 100));
  if ((cmd.s || '').toLowerCase().includes(q)) return 80;
  if ((cmd.d || '').toLowerCase().includes(q)) return 40;
  return 0;
}

function CopyButton({ name, inverted }) {
  const [copied, setCopied] = useState(false);
  const onClick = (e) => {
    e.stopPropagation();
    try { navigator.clipboard.writeText('/' + name); } catch {}
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <button
      onClick={onClick}
      onMouseDown={e => e.stopPropagation()}
      title={copied ? 'Copied!' : 'Copy /' + name}
      style={{
        padding: 4, borderRadius: 4,
        color: inverted ? 'white' : (copied ? 'var(--c-config)' : 'var(--ink-3)'),
        opacity: inverted ? 0.9 : 1,
        display: 'grid', placeItems: 'center',
      }}
    >
      {copied ? (
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 8l3.5 3.5L13 5"/>
        </svg>
      ) : (
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="4" y="4" width="8" height="9" rx="1"/>
          <path d="M6 4V3a1 1 0 011-1h6a1 1 0 011 1v8a1 1 0 01-1 1h-1"/>
        </svg>
      )}
    </button>
  );
}

function VersionPill({ meta, inverted }) {
  if (!meta) return null;
  const hue = meta.kind === 'removed' ? 'var(--c-session)' : 'var(--c-config)';
  return (
    <span className="mono" style={{
      fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.1em',
      padding: '2px 5px', borderRadius: 3,
      background: inverted ? 'rgba(255,255,255,0.18)' : `color-mix(in oklch, ${hue} 14%, var(--bg-2))`,
      color: inverted ? 'white' : hue,
      whiteSpace: 'nowrap',
    }}>
      {meta.kind} v{meta.version}

}

function ThemeToggle({ theme, onToggle }) {
  const isDark = theme === 'dark';
  return (
    <button
      onClick={onToggle}
      title={isDark ? 'Switch to light' : 'Switch to dark'}
      style={{
        display: 'flex', alignItems: 'center', gap: 8,
        padding: '6px 10px', borderRadius: 6,
        border: '1px solid var(--line)',
        background: 'var(--bg-2)', color: 'var(--ink-2)',
        fontSize: 11, fontFamily: 'IBM Plex Mono',
        textTransform: 'uppercase', letterSpacing: '0.08em',
      }}

      {isDark ? (
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6 1.5a6.5 6.5 0 108.5 8.5A5.5 5.5 0 016 1.5z"/></svg>

      {isDark ? 'Dark' : 'Light'}

function App() {
  const [selectedCat, setSelectedCat] = useState('all');
  const [query, setQuery] = useState('');
  const [active, setActive] = useState(null); // command name
  const [mode, setMode] = useState('grid');   // grid | list
  const [hovered, setHovered] = useState(null);
  const [focusedName, setFocusedName] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);

  const [storedTheme, setStoredTheme] = useLocalStorage(LS.theme, null);
  const [favsArr, setFavsArr] = useLocalStorage(LS.favs, []);
  const favs = useMemo(() => new Set(Array.isArray(favsArr) ? favsArr : []), [favsArr]);
  const toggleFav = (n) => {
    setFavsArr(prev => {
      const arr = Array.isArray(prev) ? prev : [];
      return arr.includes(n) ? arr.filter(x => x !== n) : [...arr, n];
    });
  };

  const windowW = useWindowWidth();
  const mobile = windowW < 900;

  // Resolved theme: stored value, or system preference
  const [systemDark, setSystemDark] = useState(() =>
    typeof window !== 'undefined' && window.matchMedia?.('(prefers-color-scheme: dark)').matches
  );
  useEffect(() => {
    const mq = window.matchMedia?.('(prefers-color-scheme: dark)');
    if (!mq) return;
    const onChange = (e) => setSystemDark(e.matches);
    mq.addEventListener?.('change', onChange);
    return () => mq.removeEventListener?.('change', onChange);
  }, []);
  const theme = storedTheme || (systemDark ? 'dark' : 'light');
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  const byCat = useMemo(() => {
    const map = {};
    for (const c of CATEGORIES) map[c.id] = [];
    for (const cmd of CMDS) if (map[cmd.cat]) map[cmd.cat].push(cmd);
    return map;
  }, []);

  const filtered = useMemo(() => {
    if (selectedCat === '__pinned') {
      return CMDS.filter(c => favs.has(c.n));
    }
    const base = CMDS.filter(c => selectedCat === 'all' || c.cat === selectedCat);
    const q = query.trim().toLowerCase();
    if (!q) return base;
    return base
      .map(c => ({ c, s: fuzzyScore(q, c) }))
      .filter(x => x.s > 0)
      .sort((a, b) => b.s - a.s)
      .map(x => x.c);
  }, [selectedCat, query, favs]);

  // Flat ordered list respecting visible grouping (category order when 'all')
  const flatList = useMemo(() => {
    if (!query.trim() && selectedCat === 'all') {
      const byC = {};
      for (const c of filtered) (byC[c.cat] ||= []).push(c);
      const out = [];
      for (const cat of CATEGORIES) if (byC[cat.id]) out.push(...byC[cat.id]);
      return out;
    }
    return filtered;
  }, [filtered, query, selectedCat]);

  const activeCmd = active ? CMDS.find(c => c.n === active) : null;
  const hoverCmd = !mobile && hovered ? CMDS.find(c => c.n === hovered) : null;
  const previewCmd = hoverCmd || activeCmd;

  // Reset focus when the visible list changes
  useEffect(() => {
    if (flatList.length === 0) { setFocusedName(null); return; }
    setFocusedName(prev => (prev && flatList.some(c => c.n === prev)) ? prev : flatList[0].n);
  }, [flatList]);

  // Close drawer when leaving mobile
  useEffect(() => { if (!mobile) setDrawerOpen(false); }, [mobile]);

  // URL sync — mount: parse
  useEffect(() => {
    const p = new URLSearchParams(location.search);
    const cat = p.get('cat');
    const cmd = p.get('cmd');
    if (cat) {
      const valid = cat === 'all' || cat === '__pinned' || CATEGORIES.some(c => c.id === cat);
      if (valid) setSelectedCat(cat);
    }
    if (cmd && CMDS.some(c => c.n === cmd)) setActive(cmd);
    // eslint-disable-next-line
  }, []);

  // URL sync — write on change
  useEffect(() => {
    const p = new URLSearchParams();
    if (selectedCat && selectedCat !== 'all') p.set('cat', selectedCat);
    if (active) p.set('cmd', active);
    const qs = p.toString();
    history.replaceState(null, '', qs ? '?' + qs : location.pathname);
  }, [selectedCat, active]);

  // Keyboard: search focus, escape, arrow nav, enter to pin, f to favorite
  useEffect(() => {
    const onKey = (e) => {
      const inInput = document.activeElement?.tagName === 'INPUT';
      if (e.key === '/' && !inInput) {
        e.preventDefault();
        document.getElementById('search')?.focus();
        return;
      }
      if (e.key === 'Escape') {
        if (drawerOpen) { setDrawerOpen(false); return; }
        setActive(null);
        if (inInput) document.activeElement.blur();
        return;
      }
      if (inInput) return;
      if (flatList.length === 0) return;
      const idx = Math.max(0, flatList.findIndex(c => c.n === focusedName));
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        e.preventDefault();
        setFocusedName(flatList[Math.min(flatList.length - 1, idx + 1)].n);
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        e.preventDefault();
        setFocusedName(flatList[Math.max(0, idx - 1)].n);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const n = flatList[idx]?.n;
        if (n) setActive(active === n ? null : n);
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        const n = flatList[idx]?.n;
        if (n) toggleFav(n);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [flatList, focusedName, active, drawerOpen]);

  const onToggleTheme = () => setStoredTheme(theme === 'dark' ? 'light' : 'dark');

  const showDetail = !mobile || !!activeCmd;

  return (
    <div style={{
      minHeight: '100vh',
      display: 'grid',
      gridTemplateColumns: mobile ? '1fr' : '280px 1fr 380px',
      gap: 0,
      position: 'relative',
    }}>
      <Sidebar
        categories={CATEGORIES} byCat={byCat}
        selected={selectedCat}
        onSelect={(id) => { setSelectedCat(id); setDrawerOpen(false); }}
        total={CMDS.length}
        favsCount={favs.size}
        theme={theme} onToggleTheme={onToggleTheme}
        mobile={mobile} drawerOpen={drawerOpen}
        closeDrawer={() => setDrawerOpen(false)}
      />
      <Main
        cmds={filtered}
        query={query} onQuery={setQuery}
        mode={mode} setMode={setMode}
        active={active} setActive={setActive}
        setHovered={setHovered}
        selectedCat={selectedCat}
        favs={favs} toggleFav={toggleFav}
        focusedName={focusedName} setFocusedName={setFocusedName}
        mobile={mobile}
        openDrawer={() => setDrawerOpen(true)}
      />
      {showDetail && (
        <Detail
          cmd={previewCmd}
          sticky={!!activeCmd}
          clear={() => setActive(null)}
          favs={favs} toggleFav={toggleFav}
          mobile={mobile}
        />
      )}
    </div>
  );
}

/* --- Sidebar --- */
function Sidebar({categories, byCat, selected, onSelect, total, favsCount, theme, onToggleTheme, mobile, drawerOpen, closeDrawer}) {
  const sidebar = (
    <aside style={{
      borderRight: mobile ? 'none' : '1px solid var(--line)',
      background: 'var(--paper)',
      padding: '28px 22px',
      position: mobile ? 'fixed' : 'sticky',
      top: 0, left: 0,
      height: '100vh',
      width: mobile ? 280 : 'auto',
      overflowY: 'auto',
      display: 'flex', flexDirection: 'column', gap: 24,
      zIndex: mobile ? 30 : 'auto',
      transform: mobile ? (drawerOpen ? 'translateX(0)' : 'translateX(-100%)') : 'none',
      transition: mobile ? 'transform 0.22s ease' : 'none',
      boxShadow: mobile && drawerOpen ? '4px 0 32px rgba(0,0,0,0.18)' : 'none',
    }}>
      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 12}}>
        <div>
          <div className="disp" style={{fontSize: 28, fontWeight: 600, letterSpacing: '-0.02em', lineHeight: 1}}>
            Command<br/>Atlas
          </div>
          <div className="mono" style={{marginTop: 10, fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: '0.08em'}}>
            {total} commands · {categories.length} families
          </div>
        </div>
        {mobile && (
          <button onClick={closeDrawer} title="Close" style={{padding: 4, color: 'var(--ink-3)'}}>
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
          </button>
        )}
      </div>

      <nav style={{display:'flex', flexDirection:'column', gap: 2}}>
        {favsCount > 0 && (
          <>
            <CatButton
              label="Pinned"
              count={favsCount}
              active={selected==='__pinned'}
              onClick={() => onSelect('__pinned')}
              dot="var(--c-context)"
            />
            <div style={{height: 6}}/>
          </>
        )}
        <CatButton
          label="All commands"
          count={total}
          active={selected==='all'}
          onClick={() => onSelect('all')}
          dot="var(--ink)"
        />
        <div style={{height: 10}}/>
        {categories.map(c => (
          <CatButton
            key={c.id}
            label={c.label}
            hint={c.hint}
            count={(byCat[c.id]||[]).length}
            active={selected===c.id}
            onClick={() => onSelect(c.id)}
            dot={c.color}
          />
        ))}
      </nav>

      <div style={{marginTop:'auto', fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.6}}>
        <ThemeToggle theme={theme} onToggle={onToggleTheme} />
        <div className="mono" style={{textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--ink-2)', margin: '16px 0 8px'}}>Legend</div>
        <div style={{display:'flex', alignItems:'center', gap:6}}><span style={{padding:'1px 6px', fontFamily:'IBM Plex Mono', fontSize:10, background:'var(--bg-3)', borderRadius:3}}>skill</span> bundled skill</div>
        <div style={{display:'flex', alignItems:'center', gap:6, marginTop:4}}><span className="mono" style={{fontSize:10}}>&lt;arg&gt;</span> required</div>
        <div style={{display:'flex', alignItems:'center', gap:6, marginTop:4}}><span className="mono" style={{fontSize:10}}>[arg]</span> optional</div>
        <div style={{marginTop: 10, fontSize: 10, color: 'var(--ink-3)'}}>
          <kbd style={{padding:'1px 4px', background:'var(--bg-3)', borderRadius:3, fontFamily:'IBM Plex Mono'}}>/</kbd> search ·{' '}
          <kbd style={{padding:'1px 4px', background:'var(--bg-3)', borderRadius:3, fontFamily:'IBM Plex Mono'}}>↑↓</kbd> nav ·{' '}
          <kbd style={{padding:'1px 4px', background:'var(--bg-3)', borderRadius:3, fontFamily:'IBM Plex Mono'}}>⏎</kbd> pin ·{' '}
          <kbd style={{padding:'1px 4px', background:'var(--bg-3)', borderRadius:3, fontFamily:'IBM Plex Mono'}}>f</kbd> star
        </div>
      </div>
    </aside>
  );
  if (!mobile) return sidebar;
  return (
    <>
      {drawerOpen && (
        <div
          onClick={closeDrawer}
          style={{position:'fixed', inset: 0, background:'rgba(0,0,0,0.35)', zIndex: 25, backdropFilter:'blur(2px)'}}
        />
      )}
      {sidebar}
    </>
  );
}

function CatButton({label, hint, count, active, onClick, dot}) {
  return (
    <button onClick={onClick} style={{
      textAlign:'left',
      padding: '9px 10px',
      borderRadius: 6,
      background: active ? 'var(--bg-2)' : 'transparent',
      color: active ? 'var(--ink)' : 'var(--ink-2)',
      display: 'flex', alignItems:'center', gap: 10,
      transition:'background 0.12s',
    }}
    onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'var(--bg-2)'; }}
    onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}
    >
      <span style={{
        width: 9, height: 9, borderRadius: '50%',
        background: dot, flex: 'none',
        boxShadow: active ? `0 0 0 3px color-mix(in oklch, ${dot} 25%, transparent)` : 'none',
      }}/>
      <span style={{flex: 1, fontSize: 13, fontWeight: active ? 600 : 500}}>{label}</span>
      <span className="mono" style={{fontSize: 11, color: 'var(--ink-3)'}}>{count}</span>
    </button>
  );
}

/* --- Main --- */
function Main({cmds, query, onQuery, mode, setMode, active, setActive, setHovered, selectedCat, favs, toggleFav, focusedName, setFocusedName, mobile, openDrawer}) {
  // Group by category for 'all' and '__pinned'; otherwise keep as single flat group.
  // When a query is present, skip grouping to preserve score ordering.
  const grouped = useMemo(() => {
    const showGrouped = (selectedCat === 'all' || selectedCat === '__pinned') && !query.trim();
    if (!showGrouped) {
      const headerCat = (selectedCat === 'all' || selectedCat === '__pinned') ? null : selectedCat;
      return [{cat: headerCat, items: cmds, synthetic: !headerCat }];
    }
    const byCat = {};
    for (const c of cmds) { (byCat[c.cat] ||= []).push(c); }
    return CATEGORIES.filter(c => byCat[c.id]).map(c => ({ cat: c.id, items: byCat[c.id] }));
  }, [cmds, selectedCat, query]);

  const catInfo = (id) => CATEGORIES.find(c => c.id === id);

  return (
    <main style={{padding: mobile ? '20px 18px 80px' : '28px 36px 80px', minWidth:0}}>
      {/* Search bar */}
      <div style={{
        display:'flex', alignItems:'center', gap: 10,
        padding: '12px 14px',
        border: '1px solid var(--line)', borderRadius: 10,
        background: 'var(--paper)',
        marginBottom: 24,
      }}>
        {mobile && (
          <button onClick={openDrawer} title="Menu" style={{padding: 4, color: 'var(--ink-2)', display:'grid', placeItems:'center'}}>
            <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M2 4h12M2 8h12M2 12h12"/></svg>
          </button>
        )}
        <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="var(--ink-3)" strokeWidth="1.6">
          <circle cx="9" cy="9" r="5.5"/><path d="M13 13l4 4" strokeLinecap="round"/>
        </svg>
        <input
          id="search"
          placeholder={mobile ? 'Search commands' : 'Search commands  ·  press  /  to focus'}
          value={query}
          onChange={e => onQuery(e.target.value)}
          style={{
            flex: 1, border: 0, outline: 'none', background: 'transparent',
            fontSize: 14, fontFamily: 'IBM Plex Mono', minWidth: 0,
          }}
        />
        {query && (
          <button onClick={() => onQuery('')} className="mono" style={{fontSize: 11, color:'var(--ink-3)'}}>clear</button>
        )}
        {!mobile && (
          <div style={{display:'flex', gap: 0, borderLeft:'1px solid var(--line)', paddingLeft: 10, marginLeft: 4}}>
            <ToggleBtn active={mode==='grid'} onClick={() => setMode('grid')} label="Grid" icon={
              <svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" fill="none" strokeWidth="1.4"><rect x="1" y="1" width="4" height="4"/><rect x="7" y="1" width="4" height="4"/><rect x="1" y="7" width="4" height="4"/><rect x="7" y="7" width="4" height="4"/></svg>
            }/>
            <ToggleBtn active={mode==='list'} onClick={() => setMode('list')} label="List" icon={
              <svg width="12" height="12" viewBox="0 0 12 12" stroke="currentColor" fill="none" strokeWidth="1.4"><path d="M1 3h10M1 6h10M1 9h10" strokeLinecap="round"/></svg>
            }/>
          </div>
        )}
      </div>

      {cmds.length === 0 && (
        <div style={{padding: 60, textAlign:'center', color:'var(--ink-3)'}}>
          <div className="disp" style={{fontSize: 24, color:'var(--ink-2)'}}>
            {selectedCat === '__pinned' && !query.trim()
              ? 'No pinned commands yet'
              : `No commands match "${query}"`}
          </div>
          {selectedCat === '__pinned' && !query.trim() && (
            <div className="mono" style={{marginTop: 10, fontSize: 11, color:'var(--ink-3)', letterSpacing:'0.05em'}}>
              Click the star on any card to pin it.
            </div>
          )}
        </div>
      )}

      {grouped.map(({cat, items, synthetic}) => {
        const info = cat ? catInfo(cat) : null;
        const headerLabel = synthetic
          ? (selectedCat === '__pinned' ? 'Pinned' : 'Search results')
          : info?.label;
        const headerHint = synthetic
          ? (selectedCat === '__pinned' ? 'Your starred commands' : `${cmds.length} results`)
          : info?.hint;
        const headerDot = synthetic ? (selectedCat === '__pinned' ? 'var(--c-context)' : 'var(--accent)') : info?.color;
        const sectionKey = cat || (synthetic ? 'results' : 'x');
        return (
          <section key={sectionKey} style={{marginBottom: 44}}>
            <header style={{
              display:'flex', alignItems:'baseline', gap: 14,
              marginBottom: 14, paddingBottom: 10,
              borderBottom: '1px solid var(--line)',
              flexWrap: 'wrap',
            }}>
              <span style={{width: 10, height: 10, borderRadius: '50%', background: headerDot}}/>
              <h2 className="disp" style={{fontSize: 22, fontWeight: 600, letterSpacing:'-0.01em', margin: 0}}>{headerLabel}</h2>
              <span className="mono" style={{color:'var(--ink-3)', fontSize: 11}}>{headerHint}</span>
              <span className="mono" style={{marginLeft:'auto', color:'var(--ink-3)', fontSize: 11}}>{items.length}</span>
            </header>
            {mode === 'grid' || mobile ? (
              <div style={{
                display:'grid',
                gridTemplateColumns: mobile
                  ? 'repeat(auto-fill, minmax(150px, 1fr))'
                  : 'repeat(auto-fill, minmax(200px, 1fr))',
                gap: 10,
              }}>
                {items.map(cmd => (
                  <CmdCard key={cmd.n} cmd={cmd} info={catInfo(cmd.cat)}
                    active={active===cmd.n}
                    focused={focusedName===cmd.n}
                    favorited={favs.has(cmd.n)}
                    onToggleFav={() => toggleFav(cmd.n)}
                    onClick={() => { setActive(active===cmd.n ? null : cmd.n); setFocusedName(cmd.n); }}
                    onHover={mobile ? () => {} : setHovered}
                  />
                ))}
              </div>
            ) : (
              <div style={{display:'flex', flexDirection:'column', border:'1px solid var(--line)', borderRadius: 8, overflow:'hidden', background:'var(--paper)'}}>
                {items.map((cmd, i) => (
                  <CmdRow key={cmd.n} cmd={cmd} info={catInfo(cmd.cat)}
                    last={i===items.length-1}
                    active={active===cmd.n}
                    focused={focusedName===cmd.n}
                    favorited={favs.has(cmd.n)}
                    onToggleFav={() => toggleFav(cmd.n)}
                    onClick={() => { setActive(active===cmd.n ? null : cmd.n); setFocusedName(cmd.n); }}
                    onHover={setHovered}
                  />
                ))}
              </div>
            )}
          </section>
        );
      })}

      <footer style={{marginTop: 60, paddingTop: 20, borderTop:'1px solid var(--line)', color:'var(--ink-3)', fontSize: 12, display:'flex', justifyContent:'space-between', gap: 12, flexWrap:'wrap'}}>
        <span className="mono">Type <kbd style={{padding:'1px 5px', background:'var(--bg-3)', borderRadius:3, fontFamily:'IBM Plex Mono', fontSize:10}}>/</kbd> to see every command available in a live session.</span>
        <span>Click any tile for details</span>
      </footer>
    </main>
  );
}

function ToggleBtn({active, onClick, label, icon}) {
  return (
    <button onClick={onClick} title={label} style={{
      padding: '5px 9px', borderRadius: 5,
      background: active ? 'var(--bg-3)' : 'transparent',
      color: active ? 'var(--ink)' : 'var(--ink-3)',
      display:'flex', alignItems:'center', gap: 5,
      fontSize: 11,
    }}>{icon}</button>
  );
}

/* --- Card --- */
function CmdCard({cmd, info, active, focused, favorited, onToggleFav, onClick, onHover}) {
  const Glyph = GLYPHS[cmd.g] || GLYPHS.help;
  const skill = isSkillCmd(cmd.n);
  const version = VERSION_META[cmd.n];
  const btnRef = useRef(null);
  useEffect(() => {
    if (focused && btnRef.current) {
      btnRef.current.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
  }, [focused]);
  return (
    <button
      ref={btnRef}
      onClick={onClick}
      onMouseEnter={() => onHover(cmd.n)}
      onMouseLeave={() => onHover(null)}
      style={{
        textAlign: 'left',
        padding: '14px 14px 12px',
        border: '1px solid var(--line)',
        borderRadius: 8,
        background: active ? info.color : 'var(--paper)',
        color: active ? 'white' : 'var(--ink)',
        display:'flex', flexDirection:'column', gap: 8,
        transition: 'all 0.15s ease',
        position:'relative',
        outline: 'none',
        boxShadow: focused
          ? (active ? '0 10px 24px -12px rgba(0,0,0,0.25), 0 0 0 2px var(--accent)' : '0 0 0 2px var(--accent)')
          : (active ? '0 10px 24px -12px rgba(0,0,0,0.25)' : 'none'),
        transform: active ? 'translateY(-1px)' : 'none',
      }}
      onMouseDown={e => e.currentTarget.style.transform = 'translateY(0)'}
    >
      <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap: 8}}>
        <div style={{
          width: 36, height: 36, borderRadius: 6,
          background: active ? 'rgba(255,255,255,0.15)' : `color-mix(in oklch, ${info.color} 10%, var(--bg-2))`,
          color: active ? 'white' : info.color,
          display:'grid', placeItems:'center',
          flex:'none',
        }}>
          <Glyph/>
        </div>
        <div style={{display:'flex', alignItems:'center', gap: 4, flexWrap:'wrap', justifyContent:'flex-end'}}>
          {version && <VersionPill meta={version} inverted={active}/>}
          {skill && (
            <span style={{
              fontSize: 9, fontFamily:'IBM Plex Mono',
              textTransform:'uppercase', letterSpacing:'0.1em',
              padding: '2px 5px', borderRadius: 3,
              background: active ? 'rgba(255,255,255,0.18)' : 'var(--bg-3)',
              color: active ? 'white' : 'var(--ink-2)',
            }}>skill</span>
          )}
          <StarButton active={favorited} onClick={onToggleFav} inverted={active}/>
          <CopyButton name={cmd.n} inverted={active}/>
        </div>
      </div>
      <div>
        <div className="mono" style={{fontSize: 13, fontWeight: 600, letterSpacing: '-0.01em'}}>
          /{cmd.n}
          {cmd.arg && <span style={{opacity: 0.55, fontWeight: 400, marginLeft: 4}}>{cmd.arg}</span>}
        </div>
        <div style={{fontSize: 12, color: active ? 'rgba(255,255,255,0.85)' : 'var(--ink-2)', marginTop: 4, lineHeight: 1.45}}>
          {cmd.s}
        </div>
      </div>
    </button>
  );
}

function CmdRow({cmd, info, last, active, focused, favorited, onToggleFav, onClick, onHover}) {
  const Glyph = GLYPHS[cmd.g] || GLYPHS.help;
  const skill = isSkillCmd(cmd.n);
  const version = VERSION_META[cmd.n];
  const btnRef = useRef(null);
  useEffect(() => {
    if (focused && btnRef.current) {
      btnRef.current.scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
  }, [focused]);
  return (
    <button
      ref={btnRef}
      onClick={onClick}
      onMouseEnter={() => onHover(cmd.n)}
      onMouseLeave={() => onHover(null)}
      style={{
        display:'grid',
        gridTemplateColumns: '36px 180px 1fr auto',
        gap: 14,
        alignItems:'center',
        padding: '10px 14px',
        borderBottom: last ? 'none' : '1px solid var(--line)',
        textAlign:'left',
        background: active ? 'var(--bg-2)' : 'transparent',
        color: 'var(--ink)',
        transition: 'background 0.1s',
        outline: focused ? '2px solid var(--accent)' : 'none',
        outlineOffset: -2,
        position: 'relative',
      }}
    >
      <div style={{
        width: 32, height: 32, borderRadius: 5,
        background: `color-mix(in oklch, ${info.color} 10%, var(--bg-2))`,
        color: info.color,
        display:'grid', placeItems:'center',
      }}><Glyph/></div>
      <div className="mono" style={{fontSize: 13, fontWeight: 600}}>
        /{cmd.n}
        {cmd.arg && <span style={{opacity: 0.5, fontWeight: 400, marginLeft: 4}}>{cmd.arg}</span>}
      </div>
      <div style={{fontSize: 13, color: 'var(--ink-2)'}}>{cmd.s}</div>
      <div style={{display:'flex', justifyContent:'flex-end', alignItems:'center', gap: 6}}>
        {version && <VersionPill meta={version}/>}
        {skill && <span style={{fontSize: 9, fontFamily:'IBM Plex Mono', textTransform:'uppercase', letterSpacing:'0.1em', padding: '2px 5px', borderRadius: 3, background: 'var(--bg-3)', color:'var(--ink-2)'}}>skill</span>}
        <StarButton active={favorited} onClick={onToggleFav}/>
        <CopyButton name={cmd.n}/>
      </div>
    </button>
  );
}

/* Known skills list */
const SKILLS = new Set(['batch','claude-api','debug','fewer-permission-prompts','loop','simplify']);
function isSkillCmd(n) { return SKILLS.has(n); }

/* --- Detail pane --- */
function Detail({cmd, sticky, clear, favs, toggleFav, mobile}) {
  const asideBase = mobile ? {
    position: 'fixed',
    left: 0, right: 0, bottom: 0,
    maxHeight: '82vh',
    borderTopLeftRadius: 16,
    borderTopRightRadius: 16,
    borderTop: '1px solid var(--line)',
    background: 'var(--paper)',
    padding: '20px 22px 28px',
    overflowY: 'auto',
    display: 'flex', flexDirection: 'column', gap: 16,
    zIndex: 35,
    boxShadow: '0 -12px 40px rgba(0,0,0,0.24)',
  } : {
    borderLeft: '1px solid var(--line)',
    background: 'var(--paper)',
    padding: 28,
    position: 'sticky', top: 0, height: '100vh',
    overflowY: 'auto',
    display: 'flex', flexDirection: 'column', gap: 18,
  };

  if (!cmd) {
    if (mobile) return null;
    return (
      <aside style={asideBase}>
        <div className="mono" style={{fontSize: 11, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--ink-3)'}}>Detail</div>
        <div style={{flex: 1, display:'grid', placeItems:'center', color:'var(--ink-3)', textAlign:'center', padding: 32, border: '1px dashed var(--line)', borderRadius: 8}}>
          <div>
            <div className="disp" style={{fontSize: 28, color:'var(--ink-2)', lineHeight: 1.1}}>Hover or<br/>click a tile</div>
            <div className="mono" style={{fontSize: 11, color:'var(--ink-3)', marginTop: 12, letterSpacing:'0.05em'}}>to see details here</div>
          </div>
        </div>
        <GlossaryTeaser/>
      </aside>
    );
  }
  const info = CATEGORIES.find(c => c.id === cmd.cat);
  const Glyph = GLYPHS[cmd.g] || GLYPHS.help;
  const skill = isSkillCmd(cmd.n);
  const version = VERSION_META[cmd.n];
  const favorited = favs?.has(cmd.n);

  const pane = (
    <aside style={asideBase}>
      {mobile && (
        <div style={{
          width: 40, height: 4, borderRadius: 2, background: 'var(--line-2)',
          margin: '0 auto 4px',
        }}/>
      )}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap: 10}}>
        <div style={{display:'flex', alignItems:'center', gap: 8}}>
          <span style={{width:8, height:8, borderRadius:'50%', background: info.color}}/>
          <span className="mono" style={{fontSize: 11, textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--ink-2)'}}>{info.label}</span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap: 4}}>
          {toggleFav && (
            <StarButton active={favorited} onClick={() => toggleFav(cmd.n)}/>
          )}
          <CopyButton name={cmd.n}/>
          {(sticky || mobile) && (
            <button onClick={clear} className="mono" style={{fontSize: 11, color:'var(--ink-3)', marginLeft: 4, padding: '4px 6px'}}>
              {mobile ? 'close ×' : 'unpin ×'}
            </button>
          )}
        </div>
      </div>

      <div style={{
        width: 96, height: 96, borderRadius: 12,
        background: `color-mix(in oklch, ${info.color} 12%, var(--bg-2))`,
        color: info.color,
        display:'grid', placeItems:'center',
        flex: 'none',
      }}>
        <div style={{transform:'scale(2.4)'}}><Glyph/></div>
      </div>

      <div>
        <div className="mono" style={{fontSize: 22, fontWeight: 600, letterSpacing:'-0.02em'}}>
          /{cmd.n}
          {cmd.arg && <span style={{opacity: 0.5, fontWeight: 400, marginLeft: 6}}>{cmd.arg}</span>}
        </div>
        {cmd.a && (
          <div className="mono" style={{fontSize: 12, color:'var(--ink-3)', marginTop: 4}}>
            alias: {cmd.a}
          </div>
        )}
        <div style={{display:'flex', gap: 6, flexWrap:'wrap', marginTop: 8}}>
          {version && <VersionPill meta={version}/>}
          {skill && (
            <span style={{
              fontSize: 10, fontFamily:'IBM Plex Mono',
              textTransform:'uppercase', letterSpacing:'0.12em',
              padding: '3px 7px', borderRadius: 4,
              background: 'var(--bg-3)', color:'var(--ink-2)',
            }}>bundled skill</span>
          )}
        </div>
      </div>

      <div style={{fontSize: 15, lineHeight: 1.5, color:'var(--ink)'}}>{cmd.s}</div>
      {cmd.d && <div style={{fontSize: 13, lineHeight: 1.6, color:'var(--ink-2)'}}>{cmd.d}</div>}

      <div style={{marginTop: mobile ? 0 : 'auto', paddingTop: 16, borderTop:'1px dashed var(--line)', fontSize: 11, color:'var(--ink-3)', display:'flex', flexDirection:'column', gap:6}}>
        <div className="mono" style={{textTransform:'uppercase', letterSpacing:'0.08em'}}>Syntax</div>
        <code className="mono" style={{fontSize: 12, background:'var(--bg-3)', padding: '8px 10px', borderRadius: 4, color:'var(--ink)'}}>
          /{cmd.n}{cmd.arg ? ' ' + cmd.arg : ''}
        </code>
      </div>
    </aside>
  );

  if (!mobile) return pane;
  return (
    <>
      <div onClick={clear} style={{
        position:'fixed', inset: 0, background:'rgba(0,0,0,0.4)',
        zIndex: 32, backdropFilter:'blur(2px)',
      }}/>
      {pane}
    </>
  );
}

function GlossaryTeaser() {
  return (
    <div style={{marginTop:'auto', fontSize: 12, color:'var(--ink-3)', lineHeight: 1.6}}>
      <div className="mono" style={{textTransform:'uppercase', letterSpacing:'0.08em', color:'var(--ink-2)', marginBottom: 6}}>About</div>
      Commands control the CLI from inside a session — a quick way to switch models, manage permissions, clear context, run a workflow, and more. Not every command appears for every user; availability depends on platform, plan, and environment.
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
